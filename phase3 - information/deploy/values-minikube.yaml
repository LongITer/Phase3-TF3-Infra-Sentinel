# Táº¯t cÃ¡c observability stack náº·ng khi cháº¡y local (opensearch gÃ¢y conflict orphan resource)
opensearch:
  enabled: false
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opentelemetry-collector:
  enabled: false

# Giáº£m replicas xuá»‘ng 1 Ä‘á»ƒ tiáº¿t kiá»‡m tÃ i nguyÃªn khi cháº¡y local
components:
  frontend:
    replicas: 1
  product-catalog:
    replicas: 1
  cart:
    replicas: 1
  checkout:
    replicas: 1
  payment:
    replicas: 1
  currency:
    replicas: 1
  shipping:
    replicas: 1
  quote:
    replicas: 1
  product-reviews:
    replicas: 1

  # Äá»•i Ingress tá»« AWS ALB sang NGINX (Minikube)
  frontend-proxy:
    replicas: 1
    ingress:
      enabled: true
      ingressClassName: nginx # <<< NGINX thay vÃ¬ alb
      hosts:
        - host: techx.local # TÃªn domain local (sáº½ map vÃ o hosts file)
          paths:
            - path: /
              pathType: Prefix
              port: 8080
      annotations: {} # XoÃ¡ toÃ n bá»™ annotation cá»§a AWS ALB

load-generator:
  env:
    - name: LOCUST_WEB_HOST
      value: "0.0.0.0"
    - name: LOCUST_WEB_PORT
      value: "8089"
    - name: LOCUST_USERS
      value: "200"
    - name: LOCUST_SPAWN_RATE
      value: "20"
    - name: LOCUST_HOST
      value: "http://frontend-proxy:8080"
    - name: LOCUST_HEADLESS
      value: "false"
    - name: LOCUST_AUTOSTART
      value: "true"
