# Minikube override values cho techx-corp-chart
# Dùng file này THAY THẾ cho values-prod.yaml khi chạy local với Minikube.
# Ghi đè 2 điểm không tương thích với AWS:
#   1. Image: dùng image mặc định của chart (nghiadaulau/techx-corp trên Docker Hub)
#      KHÔNG override default.image -> chart tự dùng Docker Hub image đã có sẵn
#   2. Ingress: dùng NGINX (minikube addons enable ingress) thay vì AWS ALB

# Tắt các observability stack nặng khi chạy local (opensearch gây conflict orphan resource)
opensearch:
  enabled: false
jaeger:
  enabled: true
prometheus:
  enabled: true
grafana:
  enabled: true
  readinessProbe:
    timeoutSeconds: 5
    initialDelaySeconds: 15
  livenessProbe:
    timeoutSeconds: 5
    initialDelaySeconds: 30
  resources:
    limits:
      memory: 600Mi
    requests:
      cpu: 100m
      memory: 300Mi
opentelemetry-collector:
  enabled: true

# Giảm replicas xuống 1 để tiết kiệm tài nguyên khi chạy local
components:
  frontend:
    replicas: 2
    readinessProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 2
      periodSeconds: 2
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
  product-catalog:
    replicas: 2
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 2
      periodSeconds: 2
    resources:
      requests:
        cpu: 100m
        memory: 32Mi
      limits:
        memory: 64Mi
  cart:
    replicas: 2
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 2
      periodSeconds: 2
    resources:
      requests:
        cpu: 100m
        memory: 80Mi
  checkout:
    replicas: 2
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 2
      periodSeconds: 2
    resources:
      requests:
        cpu: 100m
        memory: 40Mi
      limits:
        memory: 64Mi
  payment:
    replicas: 2
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 2
      periodSeconds: 2
    resources:
      requests:
        cpu: 10m
        memory: 60Mi
  currency:
    replicas: 2
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 2
      periodSeconds: 2
    resources:
      requests:
        cpu: 10m
        memory: 10Mi
  shipping:
    replicas: 1
    resources:
      requests:
        cpu: 10m
        memory: 10Mi
  quote:
    replicas: 1
    resources:
      requests:
        cpu: 10m
        memory: 10Mi
  product-reviews:
    replicas: 1
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
  ad:
    replicas: 1
    resources:
      requests:
        cpu: 10m
        memory: 120Mi
  email:
    replicas: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi

  # Đổi Ingress từ AWS ALB sang NGINX (Minikube)
  frontend-proxy:
    replicas: 1
    ingress:
      enabled: true
      ingressClassName: nginx # <<< NGINX thay vì alb
      hosts:
        - host: techx.local # Tên domain local (sẽ map vào hosts file)
          paths:
            - path: /
              pathType: Prefix
              port: 8080
      annotations: {} # Xóa toàn bộ annotation của AWS ALB

  load-generator:
    enabled: false
