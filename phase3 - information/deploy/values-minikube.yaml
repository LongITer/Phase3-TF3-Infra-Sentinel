# Minikube override values cho techx-corp-chart
# Dùng file này THAY THẾ cho values-prod.yaml khi chạy local với Minikube.
# Ghi đè các điểm không tương thích với AWS/production:
#   1. Image: dùng image mặc định (nghiadaulau/techx-corp Docker Hub)
#   2. Ingress: dùng NGINX thay vì AWS ALB
#   3. flagd-ui: tắt sidecar (image không tồn tại trên Docker Hub)
#   4. shipping: dùng ghcr.io (nghiadaulau build ARM64, không chạy trên x86_64)

# Tắt stack nặng không cần thiết
opensearch:
  enabled: false
prometheus:
  enabled: false
opentelemetry-collector:
  enabled: false

# Bật observability để expose qua Tailscale (MANDATE-01)
jaeger:
  enabled: true

grafana:
  enabled: true
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
      serve_from_sub_path: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

# Giảm replicas xuống 1 để tiết kiệm tài nguyên khi chạy local
components:
  frontend:
    replicas: 1
  product-catalog:
    replicas: 1
  cart:
    replicas: 1
  checkout:
    replicas: 1
  payment:
    replicas: 1
  currency:
    replicas: 1

  # FIX: nghiadaulau/techx-corp:1.0-shipping build cho ARM64, không chạy trên x86_64
  # Dùng image multi-arch từ ghcr.io thay thế
  shipping:
    replicas: 1
    imageOverride:
      repository: ghcr.io/open-telemetry/demo
      tag: 2.2.0-shipping

  quote:
    replicas: 1
  product-reviews:
    replicas: 1

  # FIX: flagd-ui sidecar image không tồn tại trên Docker Hub -> tắt đi
  flagd:
    sidecarContainers: []

  # Đổi Ingress từ AWS ALB sang NGINX (Minikube)
  frontend-proxy:
    replicas: 1
    ingress:
      enabled: true
      ingressClassName: nginx      # <<< NGINX thay vì alb
      hosts:
        - host: techx.local        # Tên domain local (sẽ map vào hosts file)
          paths:
            - path: /
              pathType: Prefix
              port: 8080
      annotations: {}              # Xoá toàn bộ annotation của AWS ALB
